version: "0.1.0-agentic"
pipeline_type: "AI-Augmented-Continuous-Delivery"

agent_guardrails:
  allowed_tools:
    - "Cursor AI"
    - "Copilot Workspace"
    - "Aider / Claude Engineer"

  operational_rules:
    - "No direct commits to main by local AI agents."
    - "AI context files must be version-controlled."
    - "Agent-generated work must stay within the directory scope assigned by the human owner."
    - "Human review is required before merge for any agent-generated code."

execution_stages:
  stage_1_intent:
    driver: "Justine"
    action: "Write the product spec or issue scope and inject the constraints into the working context."

  stage_2_design:
    driver: "Sherwin + AI"
    action: "Generate wireframes and UI variants, then hand off design tokens and layout constraints."

  stage_3_code_generation:
    driver: "Edward + AI Agent"
    action: "Audit the repository, map the design to current architecture, generate frontend changes, and sanity-check structure before PR."

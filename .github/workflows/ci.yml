name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm check:repo-safety
      - run: pnpm check:biome
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm exec eslint src next.config.ts eslint.config.mjs vitest.config.ts
      - run: pnpm build

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: cd contracts && FOUNDRY_CACHE_PATH=cache FOUNDRY_OUT=out forge test

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      - run: go build -buildvcs=false .
